name: artificial_flash
description: "AI Training Assistant - A beginner-friendly AI model training tool"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  web_socket_channel: ^3.0.2
  dio: ^5.8.0
  file_picker: ^10.0.0
  path_provider: ^2.1.5
  fl_chart: ^0.70.2
  uuid: ^4.5.1
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  desktop_drop: ^0.5.0
  equatable: ^2.0.7
  cross_file: ^0.3.5+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
  assets:
    - assets/images/