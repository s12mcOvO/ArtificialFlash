name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore winui3\ArtificialFlash.sln

      - name: Find WinMD files in WindowsAppSDK
        shell: pwsh
        run: |
          $sdkPkg = "winui3\packages\Microsoft.WindowsAppSDK.1.5.240428000"
          echo "=== All .winmd files ==="
          Get-ChildItem $sdkPkg -Recurse -Filter "*.winmd" -ErrorAction SilentlyContinue | ForEach-Object { echo $_.FullName }
          echo ""
          echo "=== Build/native contents ==="
          if (Test-Path "$sdkPkg\build\native") {
            Get-ChildItem "$sdkPkg\build\native" -ErrorAction SilentlyContinue | ForEach-Object { echo $_.Name }
          }

      - name: Build solution (Release x64)
        run: msbuild winui3\ArtificialFlash.sln /p:Configuration=Release /p:Platform=x64 /p:AppxPackage=false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: winui3-release
          path: winui3\**\x64\Release\**
          retention-days: 5

  package:
    needs: build
    runs-on: windows-2022
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore winui3\ArtificialFlash.sln

      - name: Create test certificate
        shell: pwsh
        run: |
          New-SelfSignedCertificate -Type Custom `
            -Subject "CN=ArtificialFlashCI" `
            -KeyUsage DigitalSignature `
            -FriendlyName "ArtificialFlash CI Test Cert" `
            -CertStoreLocation "Cert:\CurrentUser\My" | Out-Null
          $thumb = (Get-ChildItem -Path "Cert:\CurrentUser\My" | Where-Object { $_.FriendlyName -eq "ArtificialFlash CI Test Cert" }).Thumbprint
          echo "CERT_THUMBPRINT=$thumb" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build appx package
        run: msbuild winui3\ArtificialFlash.sln /p:Configuration=Release /p:Platform=x64 /p:AppxPackage=true /p:AppxBundle=Never /p:UapAppxPackageBuildMode=StoreUpload /p:AppxPackageSigningEnabled=true /p:PackageCertificateThumbprint="$env:CERT_THUMBPRINT"

      - name: Upload appx package
        uses: actions/upload-artifact@v4
        with:
          name: winui3-msix
          path: winui3\ArtificialFlash\AppPackages\**
          retention-days: 5

  release:
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get tag version
        id: get_tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ steps.get_tag.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/winui3-msix/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
